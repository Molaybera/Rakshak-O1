<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak O1 | Alert History</title>
    <!-- We still use Tailwind for base reset and layout utilities, but rely on our custom CSS for the look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style/alertHistory.css">

    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
    <div class="container">

        <!-- Header -->
        <header class="page-header">
            <div class="title-section">
                <h1 style="color: #f59e0b;">Alert History Report</h1>
                <p>Comprehensive logs of all system security events.</p>
            </div>
            <a href="/" class="nav-link">← Back to Dashboard</a>
        </header>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="filter-group">
                <label for="searchType">Search Alert Type</label>
                <input type="text" id="searchType" class="filter-input" placeholder="e.g. fire, intruder..."
                    oninput="filterAlerts()">
            </div>

            <div class="filter-group">
                <label for="filterDate">Filter by Date</label>
                <input type="date" id="filterDate" class="filter-input" onchange="filterAlerts()">
            </div>

            <button class="btn-export" onclick="downloadPDF()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                    </path>
                </svg>
                Download PDF
            </button>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Alert Type</th>
                        <th>Confidence / Detail</th>
                        <th>Location</th>
                        <th>Evidence</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="alertTableBody">
                    <tr>
                        <td colspan="6" class="empty-state">Loading alert history...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="./js/alertHistory.js"></script>
</body>

</html>
