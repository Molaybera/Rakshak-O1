<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak O1 | Strategic Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    <script src="./js/rakshakSecurity.js"></script>
    <script src="./js/rakshakFire.js"></script>
    <link rel="stylesheet" href="./style/main.css">
</head>

<body class="p-4 flex flex-col">

    <header class="max-w-7xl mx-auto w-full flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter uppercase leading-none text-zinc-50">RAKSHAK <span
                    class="text-amber-500">O1</span></h1>
            <div class="flex gap-4 mt-1">
                <p class="text-zinc-400 text-[9px] font-bold uppercase tracking-widest">Intelligence Terminal</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-800 border border-zinc-700 shadow-lg shadow-black/20">
                <a href="./alertHistory.html"
                    class="text-[9px] text-amber-500 font-bold uppercase hover:underline">Alert History</a>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-800 border border-zinc-700 shadow-lg shadow-black/20">
                <a href="./managementDashboard.html"
                    class="text-[9px] text-amber-500 font-bold uppercase hover:underline">User Management</a>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-800 border border-zinc-700 shadow-lg shadow-black/20">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-amber-500"></div>
                <span id="status-text" class="text-[9px] font-bold uppercase text-zinc-400">System Offline</span>
            </div>
            <button id="main-toggle" onclick="RakshakApp.toggle()"
                class="bg-amber-600 hover:bg-amber-500 text-zinc-50 px-6 py-2 rounded-lg font-bold text-sm transition-all shadow-lg shadow-black/20 active:scale-95">
                Arm System
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
        <div class="lg:col-span-8 flex flex-col gap-6 overflow-hidden">
            <div id="screen" class="monitor-frame flex-grow relative">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="overlay"></canvas>

                <!-- Liveness Progress Ring (top-right corner) -->
                <div id="liveness-ring">
                    <svg class="liveness-svg" width="52" height="52" viewBox="0 0 52 52">
                        <circle class="track" cx="26" cy="26" r="22" fill="none" stroke-width="4" />
                        <circle id="liveness-fill" class="fill" cx="26" cy="26" r="22" fill="none" stroke-width="4"
                            stroke="#f59e0b" stroke-dasharray="138.23" stroke-dashoffset="138.23"
                            transform="rotate(-90 26 26)" />
                    </svg>
                    <div id="liveness-label"
                        class="absolute inset-0 flex items-center justify-center text-[7px] font-black uppercase text-amber-400">
                        SCAN</div>
                </div>

                <div id="loader"
                    class="absolute inset-0 bg-zinc-900/95 flex flex-col items-center justify-center z-30 transition-opacity">
                    <div id="spinner"
                        class="w-8 h-8 border-4 border-zinc-700 border-t-amber-500 rounded-full animate-spin mb-4 hidden">
                    </div>
                    <p id="loader-msg" class="text-zinc-400 font-bold uppercase text-xs">Ready for Arming</p>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-4 h-24">
                <div class="glass flex flex-col items-center justify-center">
                    <span class="text-[9px] uppercase font-bold text-zinc-400 mb-1">Live Count</span>
                    <div class="text-2xl font-mono font-black text-amber-500" id="count-val">0</div>
                </div>
                <div class="glass flex flex-col items-center justify-center">
                    <span class="text-[9px] uppercase font-bold text-zinc-400 mb-1">Liveness</span>
                    <div class="text-xl font-mono font-black text-zinc-50" id="activity-val">--</div>
                </div>
                <div class="glass flex flex-col items-center justify-center">
                    <span class="text-[9px] uppercase font-bold text-zinc-400 mb-1">Identity Status</span>
                    <div class="text-[10px] font-black uppercase text-zinc-400" id="identity-val">IDLE</div>
                </div>
                <div class="glass flex flex-col items-center justify-center">
                    <span class="text-[9px] uppercase font-bold text-zinc-400 mb-1">Fire Threat</span>
                    <div class="text-xl font-mono font-black text-zinc-400" id="fire-val">0%</div>
                </div>
            </div>
        </div>

        <aside class="lg:col-span-4 glass flex flex-col overflow-hidden">
            <div class="p-4 border-b border-zinc-700 font-bold text-[10px] uppercase text-zinc-400">Security Events
            </div>
            <div id="logs" class="flex-grow overflow-y-auto p-4 space-y-3 font-mono text-[10px]">
                <div class="text-zinc-500 italic">Arm system to begin tracking.</div>
            </div>
        </aside>
    </main>

    <!-- Hidden boost canvas for preprocessing -->
    <canvas id="boostCanvas" style="display:none;"></canvas>

    <script src="./js/main.js"></script>
</body>

</html
